<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TSS R2 Pattern creao 22</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="app-container">
    <header>
      <h1>TSS R2 Pattern creao 2</h1>
    </header>

    <main>
      <div class="canvas-panel">
        <div id="svg-container"></div>
      </div>

      <aside class="controls-panel" style="overflow-y: auto; max-height: 80vh;">
        <div class="controls-header">
          <h2>Shape Parameters</h2>
        </div>

        <div class="control-group">
          <label for="waveform-select">Wave Type</label>
          <select id="waveform-select"
            style="width: 100%; padding: 0.5rem; border-radius: 4px; border: 1px solid rgba(255,255,255,0.2); background: rgba(20,20,20,0.8); color: #fff; margin-top:0.5rem; margin-bottom:0.5rem;">
            <option value="sine">Sine (Smooth)</option>
            <option value="triangle">Triangle (Angular)</option>
            <option value="square">Square (Blocky)</option>
            <option value="bounce">Bounce (Arched)</option>
            <option value="harmonic">Harmonic (Complex)</option>
          </select>
        </div>

        <div class="control-group">
          <label for="points-slider">Complexity <span id="points-val">6</span></label>
          <input type="range" id="points-slider" min="2" max="25" value="6">
        </div>
        <div class="control-group">
          <label for="freq-x-slider">Frequency X <span id="freq-x-val">1.2</span></label>
          <input type="range" id="freq-x-slider" min="0.5" max="4.0" step="0.1" value="1.2">
        </div>
        <div class="control-group">
          <label for="freq-y-slider">Frequency Y <span id="freq-y-val">1.5</span></label>
          <input type="range" id="freq-y-slider" min="0.5" max="4.0" step="0.1" value="1.5">
        </div>
        <div class="control-group">
          <label for="modulation-slider">Modulation <span id="modulation-val">0.3</span></label>
          <input type="range" id="modulation-slider" min="0" max="1.0" step="0.05" value="0.3">
        </div>
        <div class="control-group">
          <label for="roundness-slider">Roundness <span id="roundness-val">1.0</span></label>
          <input type="range" id="roundness-slider" min="0" max="1.0" step="0.05" value="1.0">
        </div>
        <div class="control-group">
          <label for="noise-slider">Jitter / Noise <span id="noise-val">0</span></label>
          <input type="range" id="noise-slider" min="0" max="1.0" step="0.05" value="0">
        </div>

        <div class="controls-header" style="margin-top:0.5rem;">
          <h2>Style Parameters</h2>
        </div>

        <div class="control-group">
          <label for="stroke-slider">Thickness <span id="stroke-val">4</span></label>
          <input type="range" id="stroke-slider" min="1" max="50" value="4">
        </div>
        <div class="control-group">
          <label for="taper-min-slider">Taper Min <span id="taper-min-val">0.1</span></label>
          <input type="range" id="taper-min-slider" min="0" max="1.0" step="0.05" value="0.1">
        </div>
        <div class="control-group">
          <label for="taper-max-slider">Taper Max <span id="taper-max-val">1.0</span></label>
          <input type="range" id="taper-max-slider" min="0.1" max="2.0" step="0.05" value="1.0">
        </div>
        <div class="control-group">
          <label for="individuality-slider">Individuality <span id="individuality-val">0.1</span></label>
          <input type="range" id="individuality-slider" min="0" max="1.0" step="0.05" value="0.1">
        </div>

        <div class="controls-header" style="margin-top:0.5rem;">
          <h2>Appearance</h2>
        </div>

        <div class="control-group">
          <label style="display:flex; justify-content:space-between; align-items:center;">
            Drawing Color
            <input type="color" id="color-picker" value="#000000"
              style="width: 50px; height: 30px; border: none; padding: 0; cursor: pointer; background: transparent;">
          </label>
        </div>
        <div class="control-group">
          <label for="bg-upload">Background Image</label>
          <input type="file" id="bg-upload" accept="image/*" style="width: 100%; color: #fff; margin-top: 0.5rem;">
        </div>

        <div class="controls-header" style="margin-top:0.5rem;">
          <h2>Animation</h2>
        </div>

        <div class="control-group">
          <label style="display:flex; justify-content:space-between; align-items:center;">
            Animate Trim Path
            <input type="checkbox" id="animate-checkbox" style="width: auto; margin:0; accent-color: var(--primary);">
          </label>
        </div>
        <div class="control-group">
          <label for="duration-slider">Duration (s) <span id="duration-val">3</span></label>
          <input type="range" id="duration-slider" min="0.5" max="10" step="0.5" value="3">
        </div>
        <div class="control-group">
          <label for="easing-select">Easing</label>
          <select id="easing-select"
            style="width: 100%; padding: 0.5rem; border-radius: 4px; border: 1px solid rgba(255,255,255,0.2); background: rgba(20,20,20,0.8); color: #fff; margin-top:0.5rem;">
            <option value="easeInOut">Ease In Out</option>
            <option value="easeOut">Ease Out</option>
            <option value="easeIn">Ease In</option>
            <option value="linear">Linear</option>
          </select>
        </div>

        <div class="actions">
          <button id="randomize-btn" class="primary-btn">
            Generate Random
          </button>
          <button id="export-btn" class="secondary-btn">
            Export SVG
          </button>
        </div>
      </aside>
    </main>
  </div>
  <script src="main.js"></script>
</body>

</html>
